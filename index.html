<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invito 18 Anni - Gaia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark-initial: #0a0908; /* Oro Nero Iniziale */
            --bg-teal-final: #0f1c1e;   /* Ottanio Originale */
            --accent-gold: #c19a6b;
            --light-gold: #f2e1c1;
            --envelope-color: #5e503f;
            --teal-accent: #b3e5ef;
        }

        body {
            background-color: var(--bg-dark-initial);
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            color: white;
            user-select: none;
            transition: background-color 1.5s ease-in-out;
        }

        /* Sfondo Iniziale - Oro Nero */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0908 100%);
            z-index: -1;
            transition: opacity 1.5s ease-in-out;
        }

        /* Sfondo Finale - Torna al Teal di prima */
        .bg-opened {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a5663 0%, #0d3b44 70%, #081a1d 100%);
            z-index: -2;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        body.opened {
            background-color: var(--bg-teal-final);
        }

        body.opened .bg-container {
            opacity: 0;
        }

        body.opened .bg-opened {
            opacity: 1;
        }

        /* Glitter e Particelle */
        .sparkle {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        .gold-glitter {
            box-shadow: 0 0 12px 2px rgba(193, 154, 107, 0.9);
            background: var(--accent-gold);
        }

        .white-glitter {
            box-shadow: 0 0 10px 2px rgba(255, 255, 255, 0.8);
            background: white;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.3) translateY(0); }
            50% { opacity: 1; transform: scale(1.5) translateY(-20px); filter: brightness(1.8); }
        }

        /* Busta Dark Bronze */
        #envelope-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1500px;
            cursor: pointer;
            z-index: 10;
            transition: opacity 1s ease-in-out, transform 1s ease-in-out;
        }

        .envelope {
            position: relative;
            width: 320px;
            height: 220px;
            background: linear-gradient(145deg, var(--envelope-color), #1a1a1a);
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
            border: 1px solid rgba(193, 154, 107, 0.3);
        }

        .envelope:before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            border-top: 130px solid #1a1a1a;
            z-index: 5;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: top;
        }

        .envelope.open:before {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .seal {
            position: absolute;
            top: 110px;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85px;
            height: 85px;
            background: radial-gradient(circle, var(--light-gold), var(--accent-gold));
            border-radius: 50%;
            z-index: 6;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #432818;
            font-size: 36px;
            font-family: 'Great Vibes', cursive;
            box-shadow: 0 0 30px rgba(193, 154, 107, 0.6);
            border: 4px solid #0a0908;
            transition: all 0.4s ease;
        }

        /* Contenuto Invito (Tema Teal originale) */
        #main-invite {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
            text-align: center;
            position: relative;
            z-index: 5;
        }

        .fade-in-content {
            animation: elegantEntry 2s ease forwards;
        }

        @keyframes elegantEntry {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .cursive {
            font-family: 'Great Vibes', cursive;
            color: var(--teal-accent);
            text-shadow: 0 0 20px rgba(179, 229, 239, 0.6);
        }

        .big-number {
            font-size: 150px;
            font-weight: 800;
            line-height: 0.8;
            background: linear-gradient(to bottom, #ffffff 0%, var(--teal-accent) 50%, #2b8a9d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            transition: all 0.5s ease;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .action-btn:hover {
            transform: scale(1.1) translateY(-10px);
            background: rgba(179, 229, 239, 0.3);
            box-shadow: 0 0 30px rgba(179, 229, 239, 0.5);
        }

        .icon-box {
            font-size: 40px;
            margin-bottom: 8px;
        }

        .separator {
            width: 180px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #ffffff, transparent);
            margin: 40px 0;
            position: relative;
        }
        
        .separator::after {
            content: "✦";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 20px;
            padding: 0 10px;
        }
    </style>
</head>
<body>

    <div class="bg-container"></div>
    <div class="bg-opened"></div>
    <div id="sparkle-canvas"></div>

    <!-- Schermata Busta Dark Bronze su Sfondo Oro Nero -->
    <div id="envelope-container" onclick="openLetter()">
        <div class="text-center mb-8 absolute top-20 w-full px-4" id="instruction-text">
            <h2 class="text-gray-400 uppercase tracking-[0.6em] font-light text-xs mb-4">Sei stato invitato ad un evento unico</h2>
            <h1 class="text-white uppercase tracking-widest font-semibold text-3xl drop-shadow-2xl">Apri per scoprire</h1>
        </div>
        <div class="envelope" id="envelope">
            <div class="seal">G</div>
        </div>
    </div>

    <!-- Schermata Invito Principale (Torna al tema Teal) -->
    <div id="main-invite">
        <div class="mb-4">
            <p class="uppercase tracking-[0.7em] text-teal-200 text-[10px] mb-8">Festeggia con noi il traguardo di</p>
            <div class="big-number">18</div>
            <h1 class="cursive text-9xl my-8">Gaia</h1>
        </div>
        
        <div class="separator"></div>
        
        <div class="space-y-6">
            <p class="text-xl font-light tracking-[0.5em] text-teal-100">MERCOLEDÌ</p>
            <p class="text-6xl font-bold tracking-[0.2em] text-white">20 MAGGIO</p>
            <p class="text-2xl font-medium text-teal-200">ORE 20:00</p>
        </div>

        <div class="flex gap-16 mt-24">
            <a href="https://maps.google.com" target="_blank" class="action-btn">
                <div class="icon-box">📍</div>
                <span>Mappa</span>
            </a>

            <a href="https://wa.me/393339837419?text=Ciao%20Gaia,%20confermo%20con%20gioia%20la%20mia%20presenza%20al%20tuo%20compleanno!" target="_blank" class="action-btn">
                <div class="icon-box">✨</div>
                <span>Conferma</span>
            </a>
        </div>

        <div class="mt-32 opacity-10">
            <p class="text-[10px] uppercase tracking-[1em] text-white">#GAIA18</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('sparkle-canvas');
        const sparkleCount = 500;

        for (let i = 0; i < sparkleCount; i++) {
            const sparkle = document.createElement('div');
            const isGold = Math.random() > 0.5;
            sparkle.className = `sparkle ${isGold ? 'gold-glitter' : 'white-glitter'}`;
            
            const x = Math.random() * 100;
            const y = Math.random() * 100;
            sparkle.style.left = x + 'vw';
            sparkle.style.top = y + 'vh';
            
            const size = Math.random() * 5 + 1;
            sparkle.style.width = size + 'px';
            sparkle.style.height = size + 'px';
            
            const duration = Math.random() * 2 + 1;
            const delay = Math.random() * 12;
            sparkle.style.setProperty('--duration', duration + 's');
            sparkle.style.animationDelay = delay + 's';
            
            canvas.appendChild(sparkle);
        }

        function openLetter() {
            const env = document.getElementById('envelope');
            const inst = document.getElementById('instruction-text');
            const container = document.getElementById('envelope-container');
            const main = document.getElementById('main-invite');

            document.body.classList.add('opened');
            env.classList.add('open');
            inst.style.opacity = '0';
            inst.style.transform = 'translateY(-60px)';
            
            setTimeout(() => {
                container.style.opacity = '0';
                container.style.transform = 'scale(1.5) rotate(5deg)';
                setTimeout(() => {
                    container.style.display = 'none';
                    main.style.display = 'flex';
                    main.classList.add('fade-in-content');
                }, 1000);
            }, 800);
        }
    </script>
</body>
</html>
