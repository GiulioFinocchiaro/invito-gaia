<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invito 18 Anni - Gaia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark-initial: #0a0908;
            --bg-teal-final: #0f1c1e;
            --accent-gold: #c19a6b;
            --light-gold: #f2e1c1;
            --envelope-color: #5e503f;
            --teal-accent: #b3e5ef;
        }

        body {
            background-color: var(--bg-dark-initial);
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden; /* Evita lo scroll orizzontale */
            color: white;
            user-select: none;
            transition: background-color 1.5s ease-in-out;
        }

        /* Gestione scroll: bloccato all'inizio, attivo dopo l'apertura se necessario */
        body.locked { overflow: hidden; }
        body.opened { background-color: var(--bg-teal-final); overflow-y: auto; }

        .bg-container, .bg-opened {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            transition: opacity 1.5s ease-in-out;
        }

        .bg-container {
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0908 100%);
        }

        .bg-opened {
            background: radial-gradient(circle at center, #1a5663 0%, #0d3b44 70%, #081a1d 100%);
            opacity: 0;
            z-index: -2;
        }

        body.opened .bg-container { opacity: 0; }
        body.opened .bg-opened { opacity: 1; }

        /* Glitter */
        .sparkle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            animation: twinkle var(--duration) infinite ease-in-out;
        }
        .gold-glitter { background: var(--accent-gold); box-shadow: 0 0 8px 1px rgba(193, 154, 107, 0.8); }
        .white-glitter { background: white; box-shadow: 0 0 6px 1px rgba(255, 255, 255, 0.8); }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.3) translateY(0); }
            50% { opacity: 1; transform: scale(1.2) translateY(-15px); }
        }

        /* Busta Responsive */
        #envelope-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1000px;
            cursor: pointer;
            z-index: 50;
            padding: 20px;
        }

        .envelope {
            position: relative;
            width: 100%;
            max-width: 320px; /* Larghezza mobile-friendly */
            height: 200px;
            background: linear-gradient(145deg, var(--envelope-color), #1a1a1a);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            border: 1px solid rgba(193, 154, 107, 0.2);
        }

        .envelope:before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 0; height: 0;
            border-left: 160px solid transparent; /* Metà della larghezza max */
            border-right: 160px solid transparent;
            border-top: 110px solid #1a1a1a;
            z-index: 5;
            transition: transform 0.8s ease;
            transform-origin: top;
        }
        
        /* Fix per la larghezza dinamica della busta su schermi piccoli */
        @media (max-width: 360px) {
            .envelope:before {
                border-left-width: 140px;
                border-right-width: 140px;
            }
        }

        .envelope.open:before { transform: rotateX(180deg); z-index: 1; }

        .seal {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 70px; height: 70px;
            background: radial-gradient(circle, var(--light-gold), var(--accent-gold));
            border-radius: 50%;
            z-index: 6;
            display: flex;
            justify-content: center; align-items: center;
            color: #432818;
            font-size: 30px;
            font-family: 'Great Vibes', cursive;
            box-shadow: 0 0 20px rgba(193, 154, 107, 0.5);
            border: 3px solid #0a0908;
        }

        /* Contenuto Invito */
        #main-invite {
            display: none;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 60px 20px;
            text-align: center;
        }

        .big-number {
            font-size: clamp(100px, 25vw, 150px); /* Testo fluido */
            font-weight: 800;
            background: linear-gradient(to bottom, #ffffff, var(--teal-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .cursive {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(5rem, 15vw, 8rem);
            color: var(--teal-accent);
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(8px);
            width: 110px; height: 110px;
            border-radius: 50%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            font-size: 11px;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .separator {
            width: 140px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #ffffff, transparent);
            margin: 30px 0;
            position: relative;
        }
    </style>
</head>
<body class="locked">

    <div class="bg-container"></div>
    <div class="bg-opened"></div>
    <div id="sparkle-canvas"></div>

    <div id="envelope-container" onclick="openLetter()">
        <div class="text-center absolute top-10 md:top-20 w-full px-6" id="instruction-text">
            <h2 class="text-gray-400 uppercase tracking-[0.4em] text-[10px] mb-2">Sei stato invitato</h2>
            <h1 class="text-white uppercase tracking-widest font-semibold text-2xl">Apri per scoprire</h1>
        </div>
        <div class="envelope" id="envelope">
            <div class="seal">G</div>
        </div>
    </div>

    <div id="main-invite" class="opacity-0">
        <div class="w-full max-w-lg">
            <p class="uppercase tracking-[0.5em] text-teal-200 text-[9px] mb-4">I diciotto anni di</p>
            <div class="big-number leading-none">18</div>
            <h1 class="cursive leading-none mt-4 mb-8">Gaia</h1>
            
            <div class="flex justify-center"><div class="separator"></div></div>
            
            <div class="space-y-4 my-8">
                <p class="text-lg font-light tracking-[0.4em] text-teal-100">MERCOLEDÌ</p>
                <p class="text-4xl md:text-6xl font-bold tracking-[0.1em] text-white">20 MAGGIO</p>
                <p class="text-xl font-medium text-teal-200">ORE 20:00</p>
            </div>

            <div class="flex justify-center gap-8 md:gap-16 mt-12">
                <a href="https://maps.google.com" target="_blank" class="action-btn">
                    <span class="text-3xl mb-1">📍</span>
                    <span>Mappa</span>
                </a>
                <a href="https://wa.me/393339837419?text=Ciao%20Gaia,%20confermo%20la%20mia%20presenza!" target="_blank" class="action-btn">
                    <span class="text-3xl mb-1">✨</span>
                    <span>Conferma</span>
                </a>
            </div>

            <div class="mt-20 opacity-20">
                <p class="text-[9px] uppercase tracking-[0.8em]">#GAIA18</p>
            </div>
        </div>
    </div>

    <script>
        // Generazione sparkle ridotta per performance mobile
        const canvas = document.getElementById('sparkle-canvas');
        const sparkleCount = window.innerWidth < 768 ? 40 : 80;

        for (let i = 0; i < sparkleCount; i++) {
            const sparkle = document.createElement('div');
            const isGold = Math.random() > 0.5;
            sparkle.className = `sparkle ${isGold ? 'gold-glitter' : 'white-glitter'}`;
            sparkle.style.left = Math.random() * 100 + 'vw';
            sparkle.style.top = Math.random() * 100 + 'vh';
            const size = Math.random() * 3 + 1;
            sparkle.style.width = size + 'px';
            sparkle.style.height = size + 'px';
            sparkle.style.setProperty('--duration', (Math.random() * 2 + 2) + 's');
            sparkle.style.animationDelay = Math.random() * 5 + 's';
            canvas.appendChild(sparkle);
        }

        function openLetter() {
            const env = document.getElementById('envelope');
            const inst = document.getElementById('instruction-text');
            const container = document.getElementById('envelope-container');
            const main = document.getElementById('main-invite');

            document.body.classList.remove('locked');
            document.body.classList.add('opened');
            env.classList.add('open');
            inst.style.opacity = '0';
            inst.style.transition = '0.5s';
            
            setTimeout(() => {
                container.style.transition = '1s';
                container.style.opacity = '0';
                container.style.transform = 'scale(1.2)';
                
                setTimeout(() => {
                    container.style.display = 'none';
                    main.style.display = 'flex';
                    // Trigger animazione ingresso
                    setTimeout(() => {
                        main.style.opacity = '1';
                        main.style.transition = 'opacity 2s ease';
                    }, 100);
                }, 800);
            }, 700);
        }
    </script>
</body>
</html>
